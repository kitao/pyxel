<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pyxel MML Commands</title>
    <link rel="icon" href="../../wasm/images/pyxel_icon_64x64.ico" />
    <link rel="stylesheet" href="../styles.css" />
    <script src="../shared.js"></script>
    <style>
      .td {
        border-color: #1f2937;
        vertical-align: top;
      }
    </style>
  </head>
  <body class="page h-full">
    <div class="page-container">
      <div
        class="flex sm:flex-row flex-col justify-between items-start sm:items-center gap-2 mb-2"
      >
        <h1 id="page-title" class="heading">Pyxel MML Commands</h1>
        <select
          id="lang-select"
          class="lang-select self-start sm:self-auto mt-2 sm:mt-0"
          aria-label="Language"
          style="display: none"
        ></select>
      </div>
      <p id="page-subtitle" class="mb-4 subheading">
        MML command list for
        <a
          href="https://github.com/kitao/pyxel"
          target="_blank"
          rel="noopener noreferrer"
          class="link"
          >Pyxel</a
        >, a retro game engine for Python.
      </p>

      <div class="overflow-x-auto card-compact">
        <table class="w-full border-collapse stack">
          <thead>
            <tr>
              <th id="th-command" class="th">Command</th>
              <th id="th-description" class="th">Description</th>
            </tr>
          </thead>
          <tbody id="command-table"></tbody>
        </table>
      </div>
    </div>

    <script>
      let data = null;
      let lang = "en";

      function updateTexts() {
        // Title and subtitle
        document.title = t("title");
        document.getElementById("page-title").textContent = t("title");
        document.getElementById("page-subtitle").innerHTML = t(
          "subtitle",
        ).replace("{0}", link("https://github.com/kitao/pyxel", "Pyxel"));

        // Table headers
        document.getElementById("th-command").textContent = t("th_command");
        document.getElementById("th-description").textContent =
          t("th_description");

        // Commands
        const commandTable = document.getElementById("command-table");
        commandTable.innerHTML = "";
        const thCmd = t("th_command");
        const thDesc = t("th_description");

        for (const c of data.commands) {
          let cmdHtml = esc(c.cmd);
          if (c.cmd.startsWith("C/D/E/F/G/A/B")) {
            cmdHtml = cmdHtml.replaceAll("/", "/<wbr>");
          }

          const descText = esc(c.desc[lang] || c.desc.en || "")
            .replace(/`([^`]+)`/g, (_, m) => `<code>${m}</code>`)
            .replaceAll("\\n", "<br>");

          const tr = document.createElement("tr");
          tr.className = "rowcard";
          tr.innerHTML = `
            <td class="w-full sm:w-40 max-w-none break-words whitespace-normal td mono shrink-0">
              <span class="sm:hidden font-medium text-gray-500 text-xs">${thCmd}</span>
              <div>${cmdHtml}</div>
            </td>
            <td class="td">
              <span class="sm:hidden font-medium text-gray-500 text-xs">${thDesc}</span>
              <div>${descText}</div>
              ${c.example ? `<div class="example">${esc(c.example)}</div>` : ""}
            </td>
          `;
          commandTable.appendChild(tr);
        }

        setDocLang(lang);
      }

      // Init i18n
      fetch("mml-commands.json")
        .then((r) => r.json())
        .then((json) => {
          data = json;
          lang = detectLang(data.languages);
          buildLangSelector(
            data.languages,
            lang,
            (v) => {
              lang = v;
              updateTexts();
            },
            document.getElementById("lang-select"),
          );

          updateTexts();
        })
        .catch((e) => console.error("Failed to load data:", e));
    </script>
  </body>
</html>
