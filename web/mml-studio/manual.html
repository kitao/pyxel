<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pyxel MML Studio Manual</title>
    <link rel="icon" href="../../wasm/images/pyxel_icon_64x64.ico" />
    <link rel="stylesheet" href="../styles.css" />
    <script src="../shared.js"></script>
  </head>

  <body class="page min-h-full">
    <main class="page-container" id="app">
      <div class="flex justify-center items-center py-12 text-gray-500 text-sm">
        Loading...
      </div>
    </main>

    <script>
      let data = null;
      let lang = "en";

      function buildPage() {
        const app = document.getElementById("app");
        app.innerHTML = "";

        // Header
        const header = document.createElement("header");
        header.className = "flex items-start gap-4 mb-6";

        const titleBlock = document.createElement("div");
        titleBlock.className = "flex-1 min-w-0 order-first";

        const h1 = document.createElement("h1");
        h1.className = "font-semibold text-2xl tracking-tight";
        h1.id = "page-title";
        titleBlock.appendChild(h1);

        const subtitle = document.createElement("p");
        subtitle.className = "mt-2 text-gray-300 text-sm";
        subtitle.id = "page-subtitle";
        titleBlock.appendChild(subtitle);

        const langSelect = buildLangSelector(data.languages, lang, (v) => {
          lang = v;
          updateTexts();
        });

        header.appendChild(langSelect);
        header.appendChild(titleBlock);
        app.appendChild(header);

        // Sections wrapper
        const sections = document.createElement("div");
        sections.className = "space-y-6";

        for (const name of [
          "overview",
          "layout",
          "controls",
          "channels",
          "sharing",
          "shortcuts",
          "mml-ref",
        ]) {
          const card = document.createElement("section");
          card.className = "card";
          card.id = `s-${name}`;
          sections.appendChild(card);
        }

        app.appendChild(sections);

        updateTexts();
      }

      function updateTexts() {
        // Title & subtitle
        document.title = t("title");
        document.getElementById("page-title").textContent = t("title");
        document.getElementById("page-subtitle").innerHTML = t(
          "subtitle",
        ).replace("{0}", link("https://github.com/kitao/pyxel", "Pyxel"));

        // Overview
        document.getElementById("s-overview").innerHTML = `
          <h2 class="section-title">${esc(t("overview_title"))}</h2>
          <p class="body">${esc(t("overview_body"))}</p>`;

        // Screen Layout
        const layoutLegend = [
          { key: "layout_controls", descKey: "layout_controls_desc" },
          { key: "layout_channels", descKey: "layout_channels_desc" },
          { key: "layout_output", descKey: "layout_output_desc" },
        ]
          .map(
            (item) =>
              `<div class="flex items-baseline gap-2">
                <span class="legend-label shrink-0 w-28">${esc(t(item.key))}</span>
                <span class="legend-desc">${esc(t(item.descKey))}</span>
              </div>`,
          )
          .join("");
        document.getElementById("s-layout").innerHTML = `
          <h2 class="section-title">${esc(t("layout_title"))}</h2>
          <p class="body mb-4">${esc(t("layout_body"))}</p>

          <!-- Layout diagram -->
          <div class="border border-gray-600 rounded-lg overflow-hidden select-none mb-4">
            <!-- Control area -->
            <div class="flex sm:flex-row flex-col items-start sm:items-center gap-3 bg-[#111827] px-3 py-3">
              <div class="flex flex-col gap-1.5 shrink-0">
                <div class="flex gap-1.5">
                  <span class="btn-chip">PLAY</span>
                  <span class="btn-chip">STOP</span>
                  <span class="inline-flex items-center bg-slate-600 px-2 py-0.5 border border-gray-600 rounded-md font-medium text-white text-xs">LOOP</span>
                </div>
                <span class="link-chip">Pyxel MML Commands</span>
                <span class="text-gray-400 text-xs">Sample Tune <span class="text-indigo-400">A</span> / <span class="text-indigo-400">B</span></span>
              </div>
              <div class="flex-1 bg-[#202224] rounded border border-gray-700 h-16 w-full sm:w-auto flex items-center justify-center">
                <span class="text-gray-500 text-xs">${esc(t("layout_runtime"))}</span>
              </div>
            </div>
            <!-- Channels -->
            <div class="bg-gray-900 px-3 py-2 space-y-2">
              <div class="flex items-center gap-2">
                <span class="text-gray-300 text-sm font-medium w-8">CH1</span>
                <span class="btn-chip">SOLO</span>
                <span class="btn-chip">MUTE</span>
              </div>
              <div class="bg-gray-900 border border-gray-600 rounded-lg h-8 w-full"></div>
              <div class="flex items-center gap-2">
                <span class="text-gray-300 text-sm font-medium w-8">CH2</span>
                <span class="btn-chip">SOLO</span>
                <span class="btn-chip">MUTE</span>
              </div>
              <div class="bg-gray-900 border border-gray-600 rounded-lg h-8 w-full"></div>
              <div class="text-center text-gray-600 text-xs py-1">CH3, CH4 ...</div>
            </div>
            <!-- URL / QR -->
            <div class="bg-gray-900 border-t border-gray-700 px-3 py-2">
              <div class="text-gray-300 text-sm font-medium mb-1">URL</div>
              <div class="bg-gray-900 border border-gray-600 rounded-lg h-7 w-full mb-2"></div>
              <div class="flex justify-start">
                <div class="bg-gray-800 border border-gray-600 rounded w-12 h-12 flex items-center justify-center">
                  <span class="text-gray-600 text-[8px]">QR</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Legend -->
          <div class="space-y-2">${layoutLegend}</div>`;

        // Controls
        const controlItems = data.control_items
          .map(
            (item) =>
              `<div class="flex items-baseline gap-3">
                ${item.type === "link" ? linkChip(item.label) : btnChip(item.label)}
                <span class="body">${esc(t(item.desc))}</span>
              </div>`,
          )
          .join("");
        document.getElementById("s-controls").innerHTML = `
          <h2 class="section-title">${esc(t("controls_title"))}</h2>
          <p class="body mb-3">${esc(t("controls_body"))}</p>
          <div class="space-y-2.5">${controlItems}</div>`;

        // Channel Input
        const channelItems = data.channel_items
          .map(
            (item) =>
              `<div class="flex items-baseline gap-3">
                ${btnChip(item.label)}
                <span class="body">${esc(t(item.desc))}</span>
              </div>`,
          )
          .join("");
        document.getElementById("s-channels").innerHTML = `
          <h2 class="section-title">${esc(t("channels_title"))}</h2>
          <p class="body mb-3">${esc(t("channels_body")).replace("{0}", chip("CDE"))}</p>
          <div class="space-y-2.5">${channelItems}</div>`;

        // Sharing
        document.getElementById("s-sharing").innerHTML = `
          <h2 class="section-title">${esc(t("sharing_title"))}</h2>
          <p class="body">${esc(t("sharing_body"))}</p>`;

        // Keyboard Shortcuts
        const shortcutRows = data.shortcuts
          .map(
            (s) =>
              `<tr>
                <td class="td"><span class="key">${esc(s.key)}</span></td>
                <td class="td text-gray-300">${esc(t(s.action))}</td>
              </tr>`,
          )
          .join("");
        document.getElementById("s-shortcuts").innerHTML = `
          <h2 class="section-title">${esc(t("shortcuts_title"))}</h2>
          <p class="body mb-3">${esc(t("shortcuts_body"))}</p>
          <div class="overflow-x-auto">
            <table class="w-full border-collapse">
              <thead>
                <tr>
                  <th class="th">${esc(t("th_shortcut"))}</th>
                  <th class="th">${esc(t("th_action"))}</th>
                </tr>
              </thead>
              <tbody>${shortcutRows}</tbody>
            </table>
          </div>`;

        // MML Command Reference
        document.getElementById("s-mml-ref").innerHTML = `
          <h2 class="section-title">${esc(t("mml_ref_title"))}</h2>
          <p class="body">${esc(t("mml_ref_body")).replace("{0}", link("mml-commands.html", t("mml_ref_link")))}</p>`;

        setDocLang(lang);
      }

      // Init
      initPage("manual.json", buildPage);
    </script>
  </body>
</html>
