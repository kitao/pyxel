    <script>
      // Cache elements
      const runtimeScreen = document.getElementById("runtime-screen");
      const shareUrl = document.getElementById("share-url");
      const qrCodeImage = document.getElementById("qr-code-image");

      // URL compression helpers
      // Base conversion (uint8ToBase64, base64ToUint8) provided by shared.js
      function b64urlEncode(bytes) {
        return uint8ToBase64(bytes)
          .replace(/\+/g, "-")
          .replace(/\//g, "_")
          .replace(/=+$/, "");
      }

      function b64urlDecode(s) {
        return base64ToUint8(s.replace(/-/g, "+").replace(/_/g, "/"));
      }

      async function compressDeflateRaw(text) {
        const stream = new Blob([text])
          .stream()
          .pipeThrough(new CompressionStream("deflate-raw"));
        const buf = await new Response(stream).arrayBuffer();
        return new Uint8Array(buf);
      }

      async function decompressDeflateRaw(bytes) {
        const stream = new Blob([bytes])
          .stream()
          .pipeThrough(new DecompressionStream("deflate-raw"));
        return await new Response(stream).text();
      }

      // Encoder: always produces new format (deflate-raw + base64url).
      async function encodeMmlToUrl(mml) {
        const compressed = await compressDeflateRaw(mml);
        return b64urlEncode(compressed);
      }

      // Decoder: detect legacy lz-string by presence of characters it uses
      // that base64url does not: `+`, `$`, and ` ` (the `+` in a URL query
      // becomes a space after URLSearchParams decoding).
      async function decodeMmlFromUrl(value) {
        if (value.includes("+") || value.includes("$") || value.includes(" ")) {
          return LZString.decompressFromEncodedURIComponent(value);
        }
        return await decompressDeflateRaw(b64urlDecode(value));
      }

      function setButtonStyle(button, isActive) {
        button.classList.toggle("active", isActive);
      }

      function handleButtonPress(button) {
        const action = button.dataset.action;
        const varName = `js_${action}`;
        let isActive;

        if (action === "play" || action === "stop") {
          isActive = true;
          setButtonStyle(button, true);
          setTimeout(() => {
            setButtonStyle(button, false);
            runtimeScreen.contentWindow[varName] = false;
          }, 150);
        } else {
          button.dataset.state = button.dataset.state !== "true";
          isActive = button.dataset.state === "true";
          setButtonStyle(button, isActive);
        }

        runtimeScreen.contentWindow[varName] = isActive;
        if (action === "play") {
          runtimeScreen.contentWindow.resetPyxel();
        }
      }

      function handleMmlInput(textarea) {
        runtimeScreen.contentWindow[`js_${textarea.id}_mml`] = textarea.value;
        updateUrl();
      }

      async function updateUrl() {
        let mmlStr = "";
        for (let i = 1; i <= 4; i++) {
          const textarea = document.getElementById(`ch${i}`);
          const ch = textarea.value
            .trim()
            .replace(/ +/g, " ")
            .replace(/\n+/g, "\n");
          mmlStr += (i > 1 ? ";" : "") + ch;
        }

        let url = location.origin + location.pathname;
        if (!/^[\s;]*$/.test(mmlStr)) {
          url += "?mml=" + (await encodeMmlToUrl(mmlStr));
        }

        shareUrl.textContent = shareUrl.href = url;
        window.history.replaceState(null, "", url);

        const qrSize = Math.max(128, Math.min(url.length, 400));
        qrCodeImage.src =
          `https://api.qrserver.com/v1/create-qr-code/?color=9ca3af&bgcolor=000000&size=${qrSize}x${qrSize}&data=` +
          encodeURIComponent(url);
        qrCodeImage.width = qrSize;
        qrCodeImage.height = qrSize;
      }

      function resolvePyxelInput() {
        runtimeScreen.contentWindow?.pyxelContext?.resolveInput?.();
      }

      window.addEventListener("DOMContentLoaded", async () => {
        // Bind inline-style handlers via data attributes
        document.querySelectorAll("[data-click]").forEach((el) => {
          el.addEventListener("click", () => handleButtonPress(el));
        });
        document.querySelectorAll("[data-input]").forEach((el) => {
          el.addEventListener("input", () => handleMmlInput(el));
        });

        // Forward input to runtime
        ["click", "touchstart"].forEach((ev) => {
          window.addEventListener(ev, resolvePyxelInput);
        });

        // Keyboard shortcuts
        window.addEventListener("keydown", (event) => {
          resolvePyxelInput();
          if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
            const playButton = document.querySelector(
              'button[data-action="play"]',
            );
            if (playButton && !playButton.disabled) {
              event.preventDefault();
              handleButtonPress(playButton);
            }
          } else if (event.key === "Escape") {
            const stopButton = document.querySelector(
              'button[data-action="stop"]',
            );
            if (stopButton && !stopButton.disabled) {
              event.preventDefault();
              handleButtonPress(stopButton);
            }
          } else if ((event.ctrlKey || event.metaKey) && event.key === "l") {
            event.preventDefault();
            const loopButton = document.querySelector(
              'button[data-action="loop"]',
            );
            if (loopButton && !loopButton.disabled) {
              handleButtonPress(loopButton);
            }
          }
        });

        // Load MML from URL
        const mmlParam = new URL(document.location).searchParams.get("mml");
        if (mmlParam) {
          const raw = await decodeMmlFromUrl(mmlParam);
          const mmlList = raw ? raw.split(";", 4) : [];
          for (let i = 1; i <= 4; i++) {
            const textarea = document.getElementById(`ch${i}`);
            textarea.value = mmlList[i - 1] || "";
            handleMmlInput(textarea);
          }
        }

        updateUrl();

        // Set initial button states
        runtimeScreen.addEventListener("load", () => {
          document.querySelectorAll("button[data-action]").forEach((button) => {
            const varName = `js_${button.dataset.action}`;
            runtimeScreen.contentWindow[varName] =
              button.dataset.state === "true";
          });
        });

        // Enable buttons when ready
        waitForPyxelReady(
          () => runtimeScreen.contentWindow?.pyxelContext?.resolveInput,
          () => {
            document
              .querySelectorAll(
                'button[data-action="play"],button[data-action="stop"],button[data-action="loop"]',
              )
              .forEach((button) => {
                button.disabled = false;
              });
          },
        );
      });
    </script>
