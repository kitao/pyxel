<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pyxel Showcase</title>
    <link rel="icon" href="../../wasm/images/pyxel_icon_64x64.ico" />
    <link rel="stylesheet" href="../styles.css">
    <script src="../shared.js"></script>
  </head>

  <body class="page min-h-full">
    <main class="page-container" id="app">
      <div class="flex justify-center items-center py-12 text-gray-500 text-sm">
        Loading...
      </div>
    </main>

    <script>
      let data = null;
      let lang = "en";

      function t(keyOrObj) {
        const obj = typeof keyOrObj === "string" ? data?.ui[keyOrObj] : keyOrObj;
        if (!obj) return typeof keyOrObj === "string" ? keyOrObj : "";
        return obj[lang] || obj["en"] || "";
      }

      function buildPage() {
        const app = document.getElementById("app");
        app.innerHTML = "";

        // Header
        const header = document.createElement("header");
        header.className = "flex items-start gap-4 mb-4";

        const titleBlock = document.createElement("div");
        titleBlock.className = "flex-1 min-w-0 order-first";

        const h1 = document.createElement("h1");
        h1.className = "font-semibold text-2xl tracking-tight";
        h1.id = "page-title";
        titleBlock.appendChild(h1);

        const subtitle = document.createElement("p");
        subtitle.className = "mt-2 text-gray-300 text-sm";
        subtitle.id = "page-subtitle";
        titleBlock.appendChild(subtitle);

        const langSelect = buildLangSelector(data.languages, lang, (v) => {
          lang = v;
          updateTexts();
        });

        header.appendChild(langSelect);
        header.appendChild(titleBlock);
        app.appendChild(header);

        // Categories
        for (const cat of data.categories) {
          const section = document.createElement("details");
          section.open = true;
          section.className = "mt-6";

          const catHeader = document.createElement("summary");
          catHeader.className =
            "flex items-center gap-3 mb-3 font-medium text-gray-400 text-sm uppercase tracking-wider";
          catHeader.dataset.catId = cat.id;
          const catText = document.createElement("span");
          catText.className = "tri";
          catHeader.appendChild(catText);
          const line = document.createElement("span");
          line.className = "flex-1 bg-gray-700 h-px";
          catHeader.appendChild(line);
          section.appendChild(catHeader);

          const card = document.createElement("div");
          card.className = "card space-y-0 divide-y divide-gray-700";

          for (let i = 0; i < cat.items.length; i++) {
            const item = cat.items[i];
            const row = document.createElement("div");
            row.className = "py-3";

            // Single line: filename + description + buttons
            const topLine = document.createElement("div");
            topLine.className =
              "flex flex-wrap items-center gap-x-3 gap-y-1";

            const fileName = document.createElement("span");
            fileName.className = "font-mono font-semibold text-sm shrink-0";
            fileName.textContent = item.file;
            topLine.appendChild(fileName);

            const desc = document.createElement("span");
            desc.className = "text-gray-400 text-sm";
            desc.dataset.descKey = cat.id + "-" + i;
            topLine.appendChild(desc);

            const buttons = document.createElement("span");
            buttons.className = "flex items-center justify-end gap-2 ml-auto shrink-0 min-w-[9.5rem]";

            const demoBtn = document.createElement("a");
            demoBtn.href = item.demo;
            demoBtn.target = "_blank";
            demoBtn.rel = "noopener noreferrer";
            demoBtn.className = "btn-demo";
            demoBtn.dataset.uiKey = "demo";
            buttons.appendChild(demoBtn);

            if (item.code) {
              const codeBtn = document.createElement("a");
              codeBtn.href = item.code;
              codeBtn.target = "_blank";
              codeBtn.rel = "noopener noreferrer";
              codeBtn.className = "btn-code";
              codeBtn.dataset.uiKey = "code";
              buttons.appendChild(codeBtn);
            }

            topLine.appendChild(buttons);
            row.appendChild(topLine);

            // Details (collapsible)
            if (item.details && Object.keys(item.details).length > 0) {
              const details = document.createElement("details");
              details.className = "mt-1";

              const summary = document.createElement("summary");
              summary.className = "tri text-gray-400 text-xs hover:text-gray-300";
              summary.dataset.uiKey = "details";
              details.appendChild(summary);

              const content = document.createElement("div");
              content.className =
                "mt-1 pl-3 border-l-2 border-gray-700 text-gray-300 text-sm leading-relaxed";
              content.dataset.detailKey = cat.id + "-" + i;
              details.appendChild(content);

              row.appendChild(details);
            }

            card.appendChild(row);
          }

          section.appendChild(card);
          app.appendChild(section);
        }

        // Footer
        const footer = document.createElement("section");
        footer.className = "mt-6 mb-2";

        const footerText = document.createElement("p");
        footerText.className = "text-gray-300 text-sm";
        footerText.id = "footer-text";
        footer.appendChild(footerText);

        app.appendChild(footer);

        updateTexts();
      }

      function updateTexts() {
        document.title = t("title");
        document.getElementById("page-title").textContent = t("title");
        document.getElementById("page-subtitle").innerHTML = t("subtitle")
          .replace("{0}", link("https://github.com/kitao/pyxel", "Pyxel"));

        // Categories, descriptions, and details
        for (const cat of data.categories) {
          const header = document.querySelector(`[data-cat-id="${cat.id}"]`);
          if (header) header.querySelector(".tri").textContent = t(cat.title);
          for (let i = 0; i < cat.items.length; i++) {
            const item = cat.items[i];
            const key = `${cat.id}-${i}`;
            const descEl = document.querySelector(`[data-desc-key="${key}"]`);
            if (descEl) descEl.textContent = t(item.description);
            const detailEl = document.querySelector(`[data-detail-key="${key}"]`);
            if (detailEl) detailEl.textContent = t(item.details) || t(item.description);
          }
        }

        // UI labels (Run, Code, Details buttons)
        document.querySelectorAll("[data-ui-key]").forEach((el) => {
          el.textContent = t(el.dataset.uiKey);
        });

        // Footer
        const linkText = t("footer_link");
        document.getElementById("footer-text").innerHTML = t("footer")
          .replace("{0}", link("https://github.com/kitao/pyxel/tree/main/web/showcase", linkText))
          .replace("{1}", link("../web-usage/", linkText));

        setDocLang(lang);
      }

      // Init
      fetch("showcase.json")
        .then((r) => r.json())
        .then((json) => {
          data = json;
          lang = detectLanguage(data.languages);
          buildPage();
        });
    </script>
  </body>
</html>
