<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pyxel Cube User Guide</title>
    <link rel="icon" href="../../../wasm/images/pyxel_icon_64x64.ico" />
    <link rel="stylesheet" href="../../styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css"
    />
    <script src="../../shared.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  </head>

  <body class="page min-h-full">
    <main class="page-container" id="app">
      <div class="flex justify-center items-center py-12 text-gray-500 text-sm">
        Loading...
      </div>
    </main>

    <script>
      let data = null;
      let lang = "en";

      function buildPage() {
        const app = document.getElementById("app");
        app.innerHTML = "";

        // Header
        const header = document.createElement("header");
        header.className = "flex items-start gap-4 mb-6";

        const titleBlock = document.createElement("div");
        titleBlock.className = "flex-1 min-w-0 order-first";

        const h1 = document.createElement("h1");
        h1.className = "font-semibold text-2xl tracking-tight";
        h1.id = "page-title";
        titleBlock.appendChild(h1);

        const subtitle = document.createElement("p");
        subtitle.className = "mt-2 text-gray-300 text-sm";
        subtitle.id = "page-subtitle";
        titleBlock.appendChild(subtitle);

        const langSelect = buildLangSelector(data.languages, lang, (v) => {
          lang = v;
          updateTexts();
        });

        header.appendChild(buildVariantSwitch());
        header.appendChild(langSelect);
        header.appendChild(titleBlock);
        app.appendChild(header);

        // Content
        const wrap = document.createElement("div");
        wrap.className = "space-y-6";
        wrap.id = "content";
        wrap.innerHTML = `
          <section class="card" id="s-overview"></section>
          <section class="card" id="s-getting-started"></section>
        `;
        app.appendChild(wrap);
        updateTexts();
      }

      function updateTexts() {
        const pyxelLink = link("https://github.com/kitao/pyxel", "Pyxel");

        // Header
        document.title = t("title");
        document.getElementById("page-title").textContent = t("title");
        document.getElementById("page-subtitle").innerHTML = t(
          "subtitle",
        ).replace("{0}", pyxelLink);

        // Overview
        document.getElementById("s-overview").innerHTML = `
          <h2 class="section-title">${esc(t("overview_title"))}</h2>
          <p class="body">${t("overview_body").replace("{0}", "<strong>Pyxel Cube</strong>")}</p>
          <p class="body mt-2">${esc(t("wip"))}</p>`;

        // Getting Started
        document.getElementById("s-getting-started").innerHTML = `
          <h2 class="section-title">${esc(t("start_title"))}</h2>
          <p class="body">${esc(t("start_body"))}</p>
          ${code(
            `import pyxel
from pyxel.cube import Camera, Mat4, Node, Vec3

class Scene(Node):
    def __init__(self):
        super().__init__()
        self.camera = Camera()
        self.camera.transform = Mat4.look_at(Vec3(0.0, 3.0, 4.0), Vec3.ZERO)

    def on_draw(self):
        self.box(Mat4.IDENTITY, Vec3(1.0, 1.0, 1.0), 11)

pyxel.init(200, 150)
scene = Scene()

def update():
    scene.update()

def draw():
    scene.draw(0, 0, pyxel.width, pyxel.height)

pyxel.run(update, draw)`,
            "python",
          )}`;

        setDocLang(lang);
        hljs.highlightAll();
      }

      // Init
      initPage("user-guide.json", buildPage);
    </script>
  </body>
</html>
