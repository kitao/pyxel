<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pyxel Web Usage</title>
    <link rel="icon" href="../../wasm/images/pyxel_icon_64x64.ico" />
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" />
    <script src="../shared.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  </head>
  <body class="page min-h-full">
    <main class="page-container" id="app">
      <div class="flex justify-center items-center py-12 text-gray-500 text-sm">Loading...</div>
    </main>
    <script>
      let data, lang = "en";

      function t(o) {
        if (!o) return "";
        if (typeof o === "string") return data?.ui[o] ? t(data.ui[o]) : o;
        return o[lang] || o["en"] || "";
      }

      function code(s, syntax) {
        return `<pre class="code-block"><code class="language-${syntax || "plaintext"}">${esc(s)}</code></pre>`;
      }

      function table(headers, rows) {
        let h = `<div class="overflow-x-auto"><table class="w-full border-collapse"><thead><tr>`;
        for (const th of headers) h += `<th class="th">${esc(th)}</th>`;
        h += `</tr></thead><tbody>`;
        for (const row of rows) {
          h += "<tr>";
          for (const cell of row) h += `<td class="td text-gray-300">${cell}</td>`;
          h += "</tr>";
        }
        return h + "</tbody></table></div>";
      }

      function build() {
        const app = document.getElementById("app");
        app.innerHTML = "";

        // Header
        const hdr = document.createElement("header");
        hdr.className = "flex items-start gap-4 mb-6";
        const titleDiv = document.createElement("div");
        titleDiv.className = "flex-1 min-w-0 order-first";
        titleDiv.innerHTML = `<h1 class="font-semibold text-2xl tracking-tight" id="p-title"></h1>
          <p class="mt-2 text-gray-300 text-sm" id="p-sub"></p>`;
        const sel = buildLangSelector(data.languages, lang, (v) => {
          lang = v;
          update();
        });
        hdr.appendChild(sel);
        hdr.appendChild(titleDiv);
        app.appendChild(hdr);

        // Content
        const wrap = document.createElement("div");
        wrap.className = "space-y-6";
        wrap.id = "content";
        wrap.innerHTML = `
          <section class="card" id="s-intro"></section>
          <section class="card" id="s-publishing"></section>
          <section class="card" id="s-code-maker"></section>
          <section class="card" id="s-launcher"></section>
          <section class="card" id="s-app2html"></section>
          <section class="card" id="s-custom-tags"></section>
        `;
        app.appendChild(wrap);
        update();
      }

      function update() {
        const $ = (id) => document.getElementById(id);
        const pyxelLink = link("https://github.com/kitao/pyxel", "Pyxel");
        const launcherLink = link("../launcher/", "Pyxel Web Launcher");
        const pyodideLink = link("https://pyodide.org/en/stable/usage/packages-in-pyodide.html", lang === "ja" ? "Pyodide 対応パッケージ" : "Pyodide-compatible packages");

        // Header
        document.title = t("title");
        $("p-title").textContent = t("title");
        $("p-sub").innerHTML = t("subtitle").replace("{0}", pyxelLink);

        // Intro
        $("s-intro").innerHTML = `
          <p class="body">${esc(t("intro_body"))}</p>`;

        // Publishing overview
        $("s-publishing").innerHTML = `
          <h2 class="section-title">${esc(t("publishing_title"))}</h2>
          <p class="body mb-3">${esc(t("publishing_body"))}</p>
          ${table(
            [t("th_method"), t("th_description")],
            [
              [`<a href="#s-code-maker" class="link-strong">Pyxel Code Maker</a>`, esc(t("method_code_maker"))],
              [`<a href="#s-launcher" class="link-strong">Pyxel Web Launcher</a>`, esc(t("method_launcher"))],
              [`<a href="#s-app2html" class="link-strong">app2html ${esc(t("th_command"))}</a>`, esc(t("method_app2html"))],
              [`<a href="#s-custom-tags" class="link-strong">${esc(t("custom_tags_title"))}</a>`, esc(t("method_custom_tags"))],
            ]
          )}`;

        // Code Maker
        const codeMakerLink = link("../code-maker/", "Pyxel Code Maker");
        const codeMakerManualLink = link("../code-maker/manual.html", lang === "ja" ? "Pyxel Code Maker マニュアル" : "Pyxel Code Maker Manual");
        $("s-code-maker").innerHTML = `
          <h2 class="section-title">${esc(t("code_maker_title"))}</h2>
          <p class="body">${t("code_maker_body").replace("{0}", codeMakerLink)}</p>
          <p class="body mt-2">${t("code_maker_manual").replace("{0}", codeMakerManualLink)}</p>`;

        // Web Launcher
        $("s-launcher").innerHTML = `
          <h2 class="section-title">${esc(t("launcher_title"))}</h2>
          <p class="body">${t("launcher_body").replace("{0}", launcherLink)}</p>
          <p class="body mt-2">${t("launcher_body2").replace("{0}", launcherLink)}</p>

          <h3 class="sub-title">${esc(t("launcher_url_title"))}</h3>
          ${code(lang === "ja"
            ? "https://kitao.github.io/pyxel/web/launcher/?<コマンド>=<ユーザー名>/<リポジトリ名>/<ブランチ名>/<パス>/<ファイル名（拡張子なし）>"
            : "https://kitao.github.io/pyxel/web/launcher/?<command>=<username>/<repository>/<branch>/<path>/<filename without extension>")}

          <h3 class="sub-title">${esc(t("launcher_commands_title"))}</h3>
          ${table(
            [t("th_command"), t("th_action")],
            [
              [chip("run"), esc(t("cmd_run"))],
              [chip("play"), esc(t("cmd_play"))],
              [chip("edit"), esc(t("cmd_edit"))],
            ]
          )}

          <h3 class="sub-title">${esc(t("launcher_url_example_title"))}</h3>
          <p class="body">${t("launcher_url_example_run")
            .replace("{0}", chip("taro"))
            .replace("{1}", chip("my_repo"))
            .replace("{2}", chip("main"))
            .replace("{3}", chip("src/scenes/title.py"))}</p>
          ${code("https://kitao.github.io/pyxel/web/launcher/?run=taro/my_repo/main/src/scenes/title")}
          <p class="body">${t("launcher_url_example_play").replace("{0}", chip("dist/games/shooter.pyxapp"))}</p>
          ${code("https://kitao.github.io/pyxel/web/launcher/?play=taro/my_repo/main/dist/games/shooter")}

          <h3 class="sub-title">${esc(t("launcher_attrs_title"))}</h3>
          <p class="body mb-3">${t("launcher_attrs_body").replace("{0}", chip("run")).replace("{1}", chip("play"))}</p>
          ${table(
            [t("th_attribute"), t("th_description")],
            [
              [chip("gamepad=enabled"), esc(t("attr_gamepad"))],
              [chip("packages=pkg1,pkg2"), t("attr_packages").replace("{0}", pyodideLink)],
            ]
          )}
          <p class="body mt-3">${t("launcher_attrs_run_example").replace("{0}", chip("run"))}</p>
          ${code("https://kitao.github.io/pyxel/web/launcher/?run=taro/my_repo/main/src/scenes/title&gamepad=enabled&packages=numpy,pandas")}
          <p class="body">${t("launcher_attrs_edit")
            .replace("{0}", chip("edit"))
            .replace("{1}", chip("editor"))
            .replace("{2}", chip("image"))
            .replace("{3}", chip("tilemap"))
            .replace("{4}", chip("sound"))
            .replace("{5}", chip("music"))}</p>
          <p class="body mt-2">${t("launcher_attrs_edit_example").replace("{0}", chip("edit"))}</p>
          ${code("https://kitao.github.io/pyxel/web/launcher/?edit=taro/my_repo/main/assets/shooter&editor=tilemap")}
          <p class="body mt-3">${t("launcher_tip")
            .replace("{0}", chip("pyxel package"))
            .replace("{1}", chip(".pyxapp"))
            .replace("{2}", chip("play"))}</p>`;

        // app2html
        $("s-app2html").innerHTML = `
          <h2 class="section-title">${esc(t("app2html_title"))}</h2>
          <p class="body">${t("app2html_body").replace("{0}", chip("pyxel app2html"))}</p>
          ${code("pyxel app2html your_app.pyxapp", "sh")}
          <p class="body">${esc(t("app2html_body2"))}</p>
          <p class="body mt-2">${esc(t("app2html_body3"))}</p>
          <p class="body mt-2">${t("app2html_gamepad").replace("{0}", chip('gamepad: "enabled"'))}</p>`;

        // Custom Tags
        $("s-custom-tags").innerHTML = `
          <h2 class="section-title">${esc(t("custom_tags_title"))}</h2>
          <p class="body">${esc(t("custom_tags_body"))}</p>

          <h3 class="sub-title">${esc(t("custom_tags_setup_title"))}</h3>
          <p class="body">${esc(t("custom_tags_setup_body"))}</p>
          ${code('<script src="https://cdn.jsdelivr.net/gh/kitao/pyxel/wasm/pyxel.js"><\/script>', "html")}
          <p class="body">${t("custom_tags_setup_version").replace("{0}", chip("@"))}</p>
          ${code('<script src="https://cdn.jsdelivr.net/gh/kitao/pyxel@v2.7.2/wasm/pyxel.js"><\/script>', "html")}

          <p class="body mt-3">${t("custom_tags_overview")
            .replace("{0}", chip("run"))
            .replace("{1}", chip("play"))
            .replace("{2}", chip("edit"))
            .replace("{3}", chip("pyxel-run"))
            .replace("{4}", chip("pyxel-play"))
            .replace("{5}", chip("pyxel-edit"))}</p>

          <h3 class="sub-title">${esc(t("custom_tags_run_title"))}</h3>
          <p class="body">${esc(t("custom_tags_run_desc"))}</p>
          <p class="body mt-2">${t("custom_tags_run_script").replace("{0}", chip("script"))}</p>
          ${code(`<pyxel-run
  script="
import pyxel
pyxel.init(200, 150)
pyxel.cls(8)
pyxel.line(20, 20, 180, 130, 7)
pyxel.show()
"
></pyxel-run>`, "html")}
          <p class="body">${t("custom_tags_run_file")
            .replace("{0}", chip("root"))
            .replace("{1}", chip("name"))
            .replace("{2}", chip("root"))
            .replace("{3}", chip("name"))}</p>
          ${code('<pyxel-run root="." name="test.py"></pyxel-run>', "html")}
          <p class="body">${t("custom_tags_run_root_omit")
            .replace("{0}", chip("root"))
            .replace("{1}", chip('root="."'))
            .replace("{2}", chip("root"))}</p>

          <h3 class="sub-title">${esc(t("custom_tags_play_title"))}</h3>
          <p class="body">${esc(t("custom_tags_play_desc"))}</p>
          <p class="body mt-2">${t("custom_tags_play_body").replace("{0}", chip("root"))}</p>
          ${code(`<pyxel-play
  root="https://cdn.jsdelivr.net/gh/kitao/pyxel/python/pyxel/examples/apps"
  name="megaball.pyxapp"
></pyxel-play>`, "html")}

          <h3 class="sub-title">${esc(t("custom_tags_edit_title"))}</h3>
          <p class="body">${esc(t("custom_tags_edit_desc"))}</p>
          <p class="body mt-2">${t("custom_tags_edit_body").replace("{0}", chip("editor"))}</p>
          ${code('<pyxel-edit root="assets" name="shooter.pyxres" editor="image"></pyxel-edit>', "html")}

          <h3 class="sub-title">${esc(t("custom_tags_common_title"))}</h3>
          <p class="body mb-3">${t("custom_tags_common_body")
            .replace("{0}", chip("pyxel-run"))
            .replace("{1}", chip("pyxel-play"))}</p>
          ${table(
            [lang === "ja" ? "属性" : "Attribute", t("th_description")],
            [
              [chip('gamepad="enabled"'), esc(t("custom_tags_attr_gamepad"))],
              [chip('packages="pkg1,pkg2"'), t("custom_tags_attr_packages").replace("{0}", pyodideLink)],
            ]
          )}

          <h3 class="sub-title" id="s-custom-tags-screen">${esc(t("custom_tags_screen_title"))}</h3>
          <p class="body">${t("custom_tags_screen_body")
            .replace("{0}", chip('id="pyxel-screen"'))
            .replace("{1}", chip("<div>"))}</p>

          <h3 class="sub-title">${esc(t("custom_tags_local_title"))}</h3>
          <p class="body">${esc(t("custom_tags_local_body"))}</p>
          <p class="body mt-2">${esc(t("custom_tags_local_body2"))}</p>
          ${code(lang === "ja"
            ? "python -m http.server\n# Mac や Linux の場合は python3 を使用"
            : "python -m http.server\n# Use python3 on macOS and Linux", "sh")}
          <p class="body">${t("custom_tags_local_access").replace("{0}", chip("http://localhost:8000/test.html"))}</p>`;


        setDocLang(lang);
        hljs.highlightAll();
      }

      // Init
      fetch("web-usage.json")
        .then((r) => r.json())
        .then((json) => {
          data = json;
          lang = detectLanguage(data.languages);
          build();
        });
    </script>
  </body>
</html>
