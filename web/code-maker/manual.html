<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pyxel Code Maker Manual</title>
    <link rel="icon" href="../../wasm/images/pyxel_icon_64x64.ico" />
    <link rel="stylesheet" href="../styles.css" />
    <script src="../shared.js"></script>
  </head>

  <body class="page min-h-full">
    <main class="page-container" id="app">
      <div class="flex justify-center items-center py-12 text-gray-500 text-sm">
        Loading...
      </div>
    </main>

    <script>
      let data = null;
      let lang = "en";

      function buildPage() {
        const app = document.getElementById("app");
        app.innerHTML = "";

        // Header
        const header = document.createElement("header");
        header.className = "flex items-start gap-4 mb-6";

        const titleBlock = document.createElement("div");
        titleBlock.className = "flex-1 min-w-0 order-first";

        const h1 = document.createElement("h1");
        h1.className = "font-semibold text-2xl tracking-tight";
        h1.id = "page-title";
        titleBlock.appendChild(h1);

        const subtitle = document.createElement("p");
        subtitle.className = "mt-2 text-gray-300 text-sm";
        subtitle.id = "page-subtitle";
        titleBlock.appendChild(subtitle);

        const langSelect = buildLangSelector(data.languages, lang, (v) => {
          lang = v;
          updateTexts();
        });

        header.appendChild(langSelect);
        header.appendChild(titleBlock);
        app.appendChild(header);

        // Sections wrapper
        const sections = document.createElement("div");
        sections.className = "space-y-6";

        for (const name of [
          "overview",
          "layout",
          "toolbar",
          "code",
          "resource",
          "runtime",
          "project",
          "drag-drop",
          "sharing",
          "shortcuts",
        ]) {
          const card = document.createElement("section");
          card.className = "card";
          card.id = `s-${name}`;
          sections.appendChild(card);
        }

        app.appendChild(sections);

        updateTexts();
      }

      function updateTexts() {
        // Title & subtitle
        document.title = t("title");
        document.getElementById("page-title").textContent = t("title");
        document.getElementById("page-subtitle").innerHTML = t(
          "subtitle",
        ).replace("{0}", link("https://github.com/kitao/pyxel", "Pyxel"));

        // Overview
        document.getElementById("s-overview").innerHTML = `
          <h2 class="section-title">${esc(t("overview_title"))}</h2>
          <p class="body">${esc(t("overview_body"))}</p>`;

        // Screen Layout
        const layoutLegend = [
          { key: "layout_toolbar", descKey: "layout_toolbar_desc" },
          { key: "layout_focus_line", descKey: "layout_focus_line_desc" },
          { key: "layout_editing_area", descKey: "layout_editing_area_desc" },
          { key: "layout_splitter", descKey: "layout_splitter_desc" },
          { key: "layout_runtime", descKey: "layout_runtime_desc" },
        ]
          .map(
            (item) =>
              `<div class="flex items-baseline gap-2">
                <span class="legend-label shrink-0 w-28">${esc(t(item.key))}</span>
                <span class="legend-desc">${esc(t(item.descKey))}</span>
              </div>`,
          )
          .join("");
        document.getElementById("s-layout").innerHTML = `
          <h2 class="section-title">${esc(t("layout_title"))}</h2>
          <p class="body mb-4">${esc(t("layout_body"))}</p>

          <!-- Layout diagram -->
          <div class="border border-gray-600 rounded-lg overflow-hidden select-none mb-4">
            <!-- Toolbar mockup -->
            <div class="flex items-center gap-2 bg-[#111827] px-3 py-2">
              <span class="font-semibold text-gray-200 text-sm mr-1 truncate">Pyxel Code Maker</span>
              <span class="text-gray-500 text-xs truncate hidden sm:inline">Playground for Pyxel</span>
              <div class="flex items-center gap-1.5 ml-auto shrink-0">
                <span class="btn-chip">Load ▼</span>
                <span class="btn-chip">Save ▼</span>
                <span class="inline-flex items-center border border-gray-600 rounded-md overflow-hidden divide-x divide-gray-600">
                  <span class="bg-slate-600 px-2 py-0.5 text-xs text-white font-medium">Code</span>
                  <span class="bg-gray-900 px-2 py-0.5 text-xs text-gray-400 font-medium">Res</span>
                </span>
                <span class="btn-chip">Run</span>
              </div>
            </div>
            <!-- Focus line -->
            <div class="flex h-[2px]">
              <div class="flex-1 bg-cyan-700"></div>
              <div class="w-3 bg-gray-700"></div>
              <div class="flex-1 bg-gray-700"></div>
            </div>
            <!-- Main area -->
            <div class="flex" style="height: 140px">
              <div class="flex-1 bg-[#111827] flex items-center justify-center">
                <div class="text-center text-gray-500 text-xs sm:text-sm">
                  <div>${esc(t("layout_editing_area"))}</div>
                  <div class="text-[10px] sm:text-xs mt-0.5 text-gray-600">${esc(t("layout_editing_area_hint"))}</div>
                </div>
              </div>
              <div class="w-3 bg-[#232d3b] shrink-0"></div>
              <div class="flex-1 bg-[#202224] flex items-center justify-center">
                <span class="text-gray-500 text-xs sm:text-sm">${esc(t("layout_runtime"))}</span>
              </div>
            </div>
          </div>

          <!-- Legend -->
          <div class="space-y-2">${layoutLegend}</div>`;

        // Toolbar
        const toolbarItems = data.toolbar_items
          .map((item) => {
            let html = `<div class="flex items-baseline gap-3">
                ${btnChip(item.label)}
                <span class="body">${esc(t(item.desc))}</span>
              </div>`;
            if (item.sub_items) {
              html += `<div class="ml-6 mt-1 space-y-1">${item.sub_items
                .map(
                  (sub) =>
                    `<div class="flex items-baseline gap-2">
                      <span class="text-xs font-medium text-gray-400 shrink-0 w-14">${esc(sub.label)}</span>
                      <span class="body">${esc(t(sub.desc))}</span>
                    </div>`,
                )
                .join("")}</div>`;
            }
            return html;
          })
          .join("");
        document.getElementById("s-toolbar").innerHTML = `
          <h2 class="section-title">${esc(t("toolbar_title"))}</h2>
          <p class="body mb-3">${esc(t("toolbar_body"))}</p>
          <div class="space-y-2.5">${toolbarItems}</div>`;

        // Code Editor
        document.getElementById("s-code").innerHTML = `
          <h2 class="section-title">${esc(t("code_title"))}</h2>
          <p class="body">${esc(t("code_body")).replace("{0}", chip("main.py"))}</p>`;

        // Resource Editor
        document.getElementById("s-resource").innerHTML = `
          <h2 class="section-title">${esc(t("resource_title"))}</h2>
          <p class="body">${esc(t("resource_body")).replace("{0}", chip("my_resource.pyxres"))}</p>`;

        // Runtime Screen
        document.getElementById("s-runtime").innerHTML = `
          <h2 class="section-title">${esc(t("runtime_title"))}</h2>
          <p class="body">${esc(t("runtime_body")).replace("{0}", `<span class="key">Ctrl(Cmd)+Enter</span>`)}</p>`;

        // Project Files
        document.getElementById("s-project").innerHTML = `
          <h2 class="section-title">${esc(t("project_title"))}</h2>
          <div class="body space-y-2">
            <p>${esc(t("project_body_1")).replace("{0}", chip("main.py")).replace("{1}", chip("my_resource.pyxres"))}</p>
            <p>${esc(t("project_body_2")).replace("{0}", chip(".pyxapp"))}</p>
            <pre class="bg-gray-900/80 rounded-lg px-3 py-2 font-mono text-xs text-gray-300 mt-2">pyxel play project_name.zip</pre>
          </div>`;

        // Drag & Drop
        document.getElementById("s-drag-drop").innerHTML = `
          <h2 class="section-title">${esc(t("drag_drop_title"))}</h2>
          <p class="body">${esc(t("drag_drop_body")).replace("{0}", chip(".py")).replace("{1}", chip(".pyxres"))}</p>`;

        // Sharing via URL
        document.getElementById("s-sharing").innerHTML = `
          <h2 class="section-title">${esc(t("sharing_title"))}</h2>
          <p class="body">${esc(t("sharing_body"))}</p>`;

        // Keyboard Shortcuts
        const shortcutRows = data.shortcuts
          .map(
            (s) =>
              `<tr>
                <td class="td"><span class="key">${esc(s.key)}</span></td>
                <td class="td text-gray-300">${esc(t(s.action))}</td>
              </tr>`,
          )
          .join("");
        document.getElementById("s-shortcuts").innerHTML = `
          <h2 class="section-title">${esc(t("shortcuts_title"))}</h2>
          <p class="body mb-3">${esc(t("shortcuts_body"))}</p>
          <div class="overflow-x-auto">
            <table class="w-full border-collapse">
              <thead>
                <tr>
                  <th class="th">${esc(t("th_shortcut"))}</th>
                  <th class="th">${esc(t("th_action"))}</th>
                </tr>
              </thead>
              <tbody>${shortcutRows}</tbody>
            </table>
          </div>`;

        setDocLang(lang);
      }

      // Init
      initPage("manual.json", buildPage);
    </script>
  </body>
</html>
