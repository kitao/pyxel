title: "Your Work Title / 作品名"
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Share your Pyxel creation! Enter your work's title in the Title field above.
        Pyxelで作った作品を共有してください！上のTitleに作品名を入力してください。

        Items marked with * are required. / * が付いた項目は必須です。

        - Description* / 作品の説明*
        - URL
        - Your name* / あなたの名前*
        - Contact / 連絡先
        - GIF* / GIFアニメ*
  - type: textarea
    id: description
    attributes:
      label: "Description / 作品の説明"
      placeholder: "e.g. Side-scrolling platform game / 横スクロールプラットフォームゲーム"
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: "URL"
      description: "GitHub repo, itch.io, etc."
    validations:
      required: false
  - type: input
    id: author
    attributes:
      label: "Your name / あなたの名前"
    validations:
      required: true
  - type: input
    id: contact
    attributes:
      label: "Contact / 連絡先"
      description: "Email, GitHub, or X account / メール、GitHub、Xアカウント"
    validations:
      required: false
  - type: textarea
    id: gif
    attributes:
      label: "GIF / GIFアニメ"
      description: "Drag & drop here. Alt(Option)+2 to record, Alt(Option)+3 to save / ここにドラッグ&ドロップ。Alt(Option)+2で録画開始、Alt(Option)+3で保存"
    validations:
      required: true
